
<div class="d-flex justify-content-center mt-4 mb-4 gap-2">
    <div>
        <button class="btn btn-outline-primary" [disabled]="isLoading" (click)="testeHttp()">API test</button>
    </div>
    <div>
        <button class="btn btn-outline-primary" [disabled]="isLoading" (click)="clearImage()">Clear image</button>
    </div>
    <div>
        <button class="btn btn-outline-primary" [disabled]="isLoading" (click)="download()">Download image</button>
    </div>
</div>

<div id="carouselExample" class="carousel slide d-flex justify-content-center">

    <div class="carousel-inner w-25">
        <div class="carousel-item active">
            <img [src]="imageSource" alt="teste" class="d-block w-100 rounded">        
        </div>
        <div class="carousel-item">
            <img [src]="imageSource" class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
            <img [src]="imageSource" class="d-block w-100" alt="...">
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    
</div>

<div class="mt-4 text-box">
    <p class="fst-italic text-secondary text-center w-50 font-monospace lh-sm"> {{ exp }}</p>
</div>
